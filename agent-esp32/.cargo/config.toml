# No [build] target — must be set via CARGO_BUILD_TARGET (justfile does this).
# Plain `cargo build` will fail without the env var; use `just build <board>` or
# set `CARGO_BUILD_TARGET=...` and `ESP_IDF_SDKCONFIG_DEFAULTS=...` manually.

[target.'cfg(target_os = "espidf")']
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = ["--cfg", "espidf_time64", "--cfg", "mio_unsupported_force_poll_poll"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
ESP_IDF_VERSION = "v5.4"
